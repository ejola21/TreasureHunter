name: PlaySpot
options:
  bundleIdPrefix: com.mking
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_CFBundleDisplayName: "Play Spot"
    INFOPLIST_KEY_NSCameraUsageDescription: "AR 화면에서 카메라를 사용합니다."
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "미션 플레이를 위해 위치 정보가 필요합니다."
    INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "미션 플레이를 위해 위치 정보가 필요합니다."
    INFOPLIST_KEY_NSMotionUsageDescription: "AR 화면과 미니게임에서 모션 센서를 사용합니다."

targets:
  PlaySpot:
    type: application
    platform: iOS
    sources:
      - path: PlaySpot
        excludes:
          - "Resources/migrate_assets.sh"
          - "Resources/MockData/**"
      - path: PlaySpot/Resources/MockData
        buildPhase: resources
        type: folder
    resources:
      - path: PlaySpot/Resources/Sounds
        buildPhase: resources
      - path: PlaySpot/Resources/treasure.sqlite
        buildPhase: resources
      - path: PlaySpot/Resources/pickerData.plist
        buildPhase: resources
      - path: PlaySpot/Resources/Localizable.xcstrings
        buildPhase: resources
    dependencies:
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ejola.playspot.dev
        DEVELOPMENT_TEAM: A76SJ5HB8R
        INFOPLIST_FILE: PlaySpot/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true

  PlaySpotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PlaySpotTests
    dependencies:
      - target: PlaySpot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mking.trasurehunter.tests

  PlaySpotUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PlaySpotUITests
    dependencies:
      - target: PlaySpot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mking.trasurehunter.uitests
